# Netlify — Octroi web (Next.js) in an npm-workspaces monorepo.
# No `base`: install at the repo ROOT so internal @tokenforge/* workspaces resolve,
# then build ONLY the web workspace (root `turbo build` would also build the Bun proxy).
[build]
  command = "npm install && npm run build --workspace=@tokenforge/web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
