# Netlify — Octroi web. Turborepo monorepo: `base` designates the package to build;
# Netlify auto-installs dependencies at the repo ROOT (so @tokenforge/* workspaces resolve)
# and builds only this package.
[build]
  base = "apps/web"
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
