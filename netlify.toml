# Netlify — Octroi web (Turborepo / npm-workspace monorepo).
# Reliable path: deploy with the Netlify CLI from apps/web (`netlify deploy
# --prod --build`), which builds against the root-installed workspaces.
# Git auto-deploy from this monorepo needs the repo reconnected via Netlify's
# GitHub App (dashboard) so its monorepo wizard sets base + workspace install.
[build]
  base = "apps/web"
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
