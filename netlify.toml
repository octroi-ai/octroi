# Netlify — Octroi web. npm-workspace monorepo: build from the REPO ROOT so the
# root `npm install` links the @tokenforge/* workspaces, then build only the web
# package and publish its .next. (Setting base=apps/web makes Netlify install
# only inside apps/web, where the workspace packages don't resolve → build fails.)
[build]
  command = "npm run build -w @tokenforge/web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
